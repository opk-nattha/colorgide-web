<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Gide</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
        script-src 'self';
        style-src 'self' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' blob: data:;
        connect-src 'self';
        worker-src 'self'">

    <!-- Icons -->
     <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
     <link rel="alternate icon" type="image/png" href="assets/icons/favicon-32x32.png">
     <link rel="shortcut icon" href="assets/icons/favicon.ico">
     <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">

    <!-- Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
     <link rel="stylesheet" href="src/style.css">
</head>

<body>
    <!-- Splash Screen -->
     <div id="splash-screen" aria-hidden="true">
        <img src="assets/intros/intro-logo.svg" alt="Color Gide" class="splash-logo">
    </div>

    <!-- Lesson Select -->
    <main class="app-shell">
        <header class="app-header">
            <div class="brand">
                <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
                    <defs>
                        <linearGradient id="brandWarm" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#ff430f"/>
                            <stop offset="1" stop-color="#ffe01e"/>
                        </linearGradient>
                    </defs>
                    <path d="M16 3c6.5 0 11 5.1 11 11.2 0 4.6-2.6 6.8-6 6.8h-2.3c-.8 0-1.4.7-1.4 1.4 0 .4.2.7.4 1 .3.4.5.8.5 1.3 0 1.3-1.2 2.3-2.6 2.1C9.6 25.8 5 20.6 5 14.5 5 8.1 9.9 3 16 3Z" fill="url(#brandWarm)"/>
                    <circle cx="11.5" cy="13" r="1.8" fill="#097aff"/>
                    <circle cx="17" cy="9.5" r="1.4" fill="#252525" opacity=".35"/>
                    <circle cx="21" cy="14.5" r="1.6" fill="#252525" opacity=".35"/>
                </svg>
                <span class="brand-name">Color Gide</span>
            </div>
            <h1 class="page-title">เลือกบทเรียนที่อยากเริ่ม</h1>
            <p class="page-subtitle">แตะการ์ดด้านล่าง แล้วเริ่มทำความเข้าใจเรื่องสีทีละขั้น</p>
        </header>

        <section class="lesson-grid" aria-label="รายการบทเรียน">

            <button type="button" class="lesson-card" data-lesson="warm-cool">
                <span class="lesson-swatch swatch-warmcool" aria-hidden="true">
                    <svg viewBox="0 0 48 48">
                        <defs>
                            <linearGradient id="wcWarm" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0" stop-color="#ff430f"/>
                                <stop offset="1" stop-color="#ffe01e"/>
                            </linearGradient>
                            <linearGradient id="wcCool" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0" stop-color="#097aff"/>
                                <stop offset="1" stop-color="#4fc3ff"/>
                            </linearGradient>
                        </defs>
                        <path d="M24 3 A21 21 0 0 1 24 45 Z" fill="url(#wcWarm)"/>
                        <path d="M24 3 A21 21 0 0 0 24 45 Z" fill="url(#wcCool)"/>
                    </svg>
                </span>
                <span class="lesson-text">
                    <span class="lesson-title">โทนร้อน โทนเย็น</span>
                    <span class="lesson-desc">แยกอารมณ์ของสีให้ออก ก่อนเริ่มผสมสีใดๆ</span>
                </span>
                <svg class="lesson-arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <button type="button" class="lesson-card" data-lesson="gradient">
                <span class="lesson-swatch swatch-gradient" aria-hidden="true">
                    <svg viewBox="0 0 48 48">
                        <defs>
                            <linearGradient id="gradBar" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0" stop-color="#097aff"/>
                                <stop offset="0.5" stop-color="#ffe01e"/>
                                <stop offset="1" stop-color="#ff430f"/>
                            </linearGradient>
                        </defs>
                        <rect x="3" y="19" width="42" height="10" rx="5" fill="url(#gradBar)"/>
                    </svg>
                </span>
                <span class="lesson-text">
                    <span class="lesson-title">การไล่สี</span>
                    <span class="lesson-desc">ไล่น้ำหนักสีให้ลื่นไหลและเป็นธรรมชาติ</span>
                </span>
                <svg class="lesson-arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <button type="button" class="lesson-card" data-lesson="mixing">
                <span class="lesson-swatch swatch-mixing" aria-hidden="true">
                    <svg viewBox="0 0 48 48">
                        <circle class="mix-a" cx="18" cy="24" r="14" fill="#ff430f"/>
                        <circle class="mix-b" cx="30" cy="24" r="14" fill="#097aff"/>
                    </svg>
                </span>
                <span class="lesson-text">
                    <span class="lesson-title">การผสมสี</span>
                    <span class="lesson-desc">ผสมสีสองสีให้ได้เฉดใหม่ตามที่ต้องการ</span>
                </span>
                <svg class="lesson-arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <button type="button" class="lesson-card" data-lesson="vibrance">
                <span class="lesson-swatch swatch-vibrance" aria-hidden="true">
                    <svg viewBox="0 0 48 48">
                        <circle cx="24" cy="24" r="21" fill="#6b6b6d"/>
                        <circle cx="24" cy="24" r="13.5" fill="#ff8a3d"/>
                        <circle cx="24" cy="24" r="6" fill="#ff430f"/>
                    </svg>
                </span>
                <span class="lesson-text">
                    <span class="lesson-title">ทำไงให้สีสด</span>
                    <span class="lesson-desc">เพิ่มความสดให้สี ไม่ให้หม่นหรือขุ่น</span>
                </span>
                <svg class="lesson-arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

        </section>
    </main>

    <!-- JS -->
     <script src="src/ui.js"></script>
</body>
</html>
